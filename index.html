<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#000d0e">

<title>Filo</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
--primary:#009ca4;
--orange:#F7941D;
--magenta:#EC008C;
--bg:#000d0e;
--text:#ff7b00;
--formulario:#ffffff;
}

body{

font-family:'Montserrat',sans-serif;
background:var(--bg);
color:white;

min-height:10vh;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

text-align:center;
padding:25px;
}

/* decoraciones fondo */

body::before{
content:'';
position:fixed;
width:420px;
height:420px;
border-radius:100%;
background:radial-gradient(circle,var(--primary),transparent 65%);
top:-120px;
left:-120px;
opacity:.18;
}

body::after{
content:'';
position:fixed;
width:320px;
height:320px;
border-radius:50%;
background:radial-gradient(circle,var(--primary),transparent 65%);
bottom:-100px;
right:-100px;
opacity:.12;
}

/* logo */

.logo{
width:140px;
margin-bottom:18px;
filter:drop-shadow(0 0 12px rgba(0,156,164,0.5));
}

/* linea superior */

.top-line{

width:100%;
max-width:420px;
height:3px;

background:radial-gradient(circle,#009ca4,#000000);

border-radius:20px;

margin-bottom:28px;
}

/* textos */

h1{

color:var(--text);
font-weight:700;
font-size:22px;
letter-spacing:1px;
margin-bottom:4px;

}

h2{

color:var(--primary);
font-size:16px;
font-weight:600;
margin-top:20px;

}

h3{

color:var(--formulario);
font-size:16px;
font-weight:600;
margin-top:25px;

}

/* boton principal */

@keyframes glow{

0%{box-shadow:0 0 10px rgba(0,156,164,.35);}
50%{box-shadow:0 0 28px rgba(0,156,164,.7);}
100%{box-shadow:0 0 10px rgba(0,156,164,.35);}

}

.btn{
background:linear-gradient(135deg,#009ca4,#007a82);
padding:16px 28px;
border-radius:14px;
font-size:22px;
font-weight:700;
letter-spacing:2px;
color:white;
text-decoration:none;
margin-top:15px;
animation:glow 3s infinite;
}

/* imagen inferior */

.montaña{

margin-top:25px;
width:100%;
height:auto;

}

/* lineas inferiores */

.color-strip{

display:flex;
gap:6px;
justify-content:center;

margin-top:28px;

width:100%;
max-width:420px;

}

.color-strip span{

height:3px;
border-radius:999px;

flex:1;

}

.cs1{background:#ff7b00;}
.cs2{background:#009da3;}
.cs3{background:#f70083;}
.cs4{background:#ffd92a;}

</style>
</head>

<body>

<img src="izzi.png" class="logo">

<div class="top-line"></div>

<h1>FILO:</h1>
<h1>CAPACITACION TECNICA</h1>

<h2>AUTOPERCEPCION DE TEMAS: CONOCIMIENTOS DE CAMPO & PLATAFORMAS Y HERRAMIENTAS</h2>

<img src="filo.png" class="montaña">

<h3>PRESIONE EL BOTÓN PARA LLENAR EL FORMULARIO</h3>


<a href="https://forms.office.com/Pages/ResponsePage.aspx?id=4kLKykqtGU2CTD_zcJvYQKx4VpjfIkdApiPbcsWmq4pUMjdTV00xM1dJTE5DMEdET01MM1JDRDBQNC4u&origin=QRCode" class="btn">FORMULARIO</a>
<br><br>
<div class="color-strip">
<span class="cs1"></span>
<span class="cs2"></span>
<span class="cs3"></span>
<span class="cs4"></span>

</div>

<script>
document.addEventListener("contextmenu", function(e){
e.preventDefault();
});
</script>

</body>
</html>
